<!DOCTYPE html>
<html>
<head>
    <title>Edit Category</title>

    <style>
        body{
            background:#f4f7fc;
            font-family:Arial,sans-serif;
        }

        .card{
            width:400px;
            margin:60px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,.2);
        }

        h1{
            text-align:center;
            color:#0d6efd;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            background:#0d6efd;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#0b5ed7;
        }
    </style>
</head>

<body>

<div class="card">

<h1>✏ Edit Category</h1>

<form method="POST">

<label>Category Name</label>

<input type="text" name="category_name" value="{{ category.category_name }}" required>

<button type="submit">Update Category</button>

</form>

</div>

</body>
</html>
