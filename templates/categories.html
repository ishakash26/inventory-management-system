<!DOCTYPE html>
<html>
<head>
    <title>Categories</title>

    <style>
        body{
            font-family:Arial;
            background:#f5f7fb;
        }

        .container{
            width:90%;
            margin:30px auto;
        }

        h1{
            color:#0d6efd;
        }

        .btn{
            background:#0d6efd;
            color:white;
            padding:10px 18px;
            border:none;
            border-radius:8px;
            text-decoration:none;
        }

        table{
            width:100%;
            margin-top:20px;
            border-collapse:collapse;
            background:white;
        }

        th{
            background:#0d6efd;
            color:white;
            padding:12px;
        }

        td{
            padding:10px;
            text-align:center;
            border:1px solid #ddd;
        }

        button{
            padding:8px 15px;
            border:none;
            border-radius:6px;
            color:white;
            cursor:pointer;
        }

        .edit{
            background:#0d6efd;
        }

        .delete{
            background:red;
        }
    </style>
</head>

<body>

<div class="container">

<h1>📂 Categories</h1>

<a href="/add-category" class="btn">+ Add Category</a>

<table>

<tr>
<th>ID</th>
<th>Category Name</th>
<th>Action</th>
</tr>

{% for c in categories %}

<tr>

<td>{{ c.id }}</td>

<td>{{ c.category_name }}</td>

<td>

<a href="/edit-category/{{ c.id }}">
<button class="edit">Edit</button>
</a>

<a href="/delete-category/{{ c.id }}">
<button class="delete">Delete</button>
</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
