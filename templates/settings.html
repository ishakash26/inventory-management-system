<!DOCTYPE html>
<html>
<head>
    <title>Settings</title>
    <style>
button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    margin:5px;
    cursor:pointer;
    background:#0d6efd;
    color:white;
    font-size:15px;
}

button:hover{
    background:#0b5ed7;
}

.logout{
    background:#dc3545;
}

.logout:hover{
    background:#bb2d3b;
}
</style>
</head>
<body id="body">

<div style="width:450px;margin:40px auto;padding:30px;border-radius:15px;background:#ffffff;box-shadow:0 0 15px rgba(0,0,0,0.2);text-align:center;">

<h1>⚙ Settings</h1>

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
width="100" height="100">

<h2>{{ admin.name }}</h2>
<p>{{ admin.email }}</p>

<hr>

<h3>Theme</h3>

<button onclick="lightMode()">☀ Light Mode</button>

<button onclick="darkMode()">🌙 Dark Mode</button>

<hr>

<h3>Account</h3>

<a href="/edit-profile">
    <button>Edit Profile</button>
</a>

<a href="/change-password">
    <button>Change Password</button>
</a>

<br><br>

<a href="/logout">
    <button class="logout">Logout</button>
</a>

</div>

</body>
<script>
function darkMode() {
    document.getElementById("body").style.backgroundColor = "#222";
    document.getElementById("body").style.color = "white";
}

function lightMode() {
    document.getElementById("body").style.backgroundColor = "white";
    document.getElementById("body").style.color = "black";
}
</script>
</html>
