<!DOCTYPE html>
<html>
<head>
    <title>Edit Supplier</title>

    <style>
        body{
            background:#f4f7fc;
            font-family:Arial,sans-serif;
        }

        .card{
            width:500px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,.2);
        }

        h1{
            text-align:center;
            color:#0d6efd;
        }

        input,textarea{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            background:#0d6efd;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:8px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="card">

<h1>Edit Supplier</h1>

<form method="POST">

<label>Supplier Name</label>
<input type="text" name="supplier_name" value="{{ supplier.supplier_name }}">

<label>Company Name</label>
<input type="text" name="company_name" value="{{ supplier.company_name }}">

<label>Phone</label>
<input type="text" name="phone" value="{{ supplier.phone }}">

<label>Email</label>
<input type="email" name="email" value="{{ supplier.email }}">

<label>Address</label>
<textarea name="address">{{ supplier.address }}</textarea>

<button type="submit">Update Supplier</button>

</form>

</div>

</body>
</html>
