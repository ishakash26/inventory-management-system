<!DOCTYPE html>
<html>
<head>
<title>Suppliers</title>

<style>
body{
    font-family:Arial;
    background:#f4f7fc;
}

.container{
    width:90%;
    margin:30px auto;
}

h1{
    color:#0d6efd;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

th,td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}

th{
    background:#0d6efd;
    color:white;
}

a{
    text-decoration:none;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:#0d6efd;
    color:white;
    cursor:pointer;
    margin-bottom:15px;
}
</style>

</head>
<body>

<div class="container">

<h1>📦 Suppliers</h1>

<a href="/add-supplier">
<button>+ Add Supplier</button>
</a>

<table>

<tr>
<th>ID</th>
<th>Supplier</th>
<th>Company</th>
<th>Phone</th>
<th>Email</th>
<th>Address</th>
<th>Action</th>
</tr>

{% for s in suppliers %}

<tr>
<td>{{ s.id }}</td>
<td>{{ s.supplier_name }}</td>
<td>{{ s.company_name }}</td>
<td>{{ s.phone }}</td>
<td>{{ s.email }}</td>
<td>{{ s.address }}</td>
<td>
    <a href="/edit-supplier/{{ s.id }}">
        <button>Edit</button>
    </a>

   <a href="/delete-supplier/{{ s.id }}">
    <button style="background: red;">Delete</button>
</td>
</tr>

{% endfor %}

</table>

</div>

</body>
</html>
