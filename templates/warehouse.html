<!DOCTYPE html>
<html>
<head>
<title>Warehouse</title>

<style>

body{
    font-family:Arial;
    background:#f4f7fc;
}

.container{
    width:90%;
    margin:30px auto;
}

h1{
    color:#0d6efd;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

th,td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}

th{
    background:#0d6efd;
    color:white;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:#0d6efd;
    color:white;
    cursor:pointer;
    margin:5px;
}

.delete{
    background:red;
}

a{
    text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h1>🏭 Warehouse</h1>

<a href="/add-warehouse">
<button>+ Add Warehouse</button>
</a>

<table>

<tr>
<th>ID</th>
<th>Warehouse</th>
<th>Location</th>
<th>Manager</th>
<th>Capacity</th>
<th>Action</th>
</tr>

{% for w in warehouses %}

<tr>

<td>{{ w.id }}</td>
<td>{{ w.warehouse_name }}</td>
<td>{{ w.location }}</td>
<td>{{ w.manager_name }}</td>
<td>{{ w.capacity }}</td>

<td>

<a href="/edit-warehouse/{{ w.id }}">
<button>Edit</button>
</a>

<a href="/delete-warehouse/{{ w.id }}">
<button class="delete">Delete</button>
</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
