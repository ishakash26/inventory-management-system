<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="dashboard">

    <div class="sidebar">
        <h2>IMS</h2>

        <ul>
            <li><i class="fa-solid fa-house"></i> Dashboard</li>
            <li>
    <a href="/products">
        <i class="fa-solid fa-box"></i> Products
    </a>
</li>
            <li><i class="fa-solid fa-warehouse"></i> Warehouse</li>
            <li><i class="fa-solid fa-cart-shopping"></i> Orders</li>
            <li><i class="fa-solid fa-chart-line"></i> Reports</li>
            <li><i class="fa-solid fa-gear"></i> Settings</li>
        </ul>
    </div>

    <div class="main">

    <div class="topbar">
        <h1>Inventory & Warehouse Management System</h1>

        <div class="profile">
            <i class="fa-solid fa-user"></i>
            <span>Admin</span>
        </div>
    </div>

    <p>Dashboard Overview</p>

<div class="cards">

    <div class="card">
        <i class="fa-solid fa-box"></i>
        <h3>Total Products</h3>
        <h2>{{ total_products }}</h2>
    </div>

    <div class="card">
        <i class="fa-solid fa-warehouse"></i>
        <h3>Out Of Stock</h3>
        <h2>{{ out_stock }}</h2>
    </div>

    <div class="card">
        <i class="fa-solid fa-cart-shopping"></i>
        <h3>Orders</h3>
        <h2> {{ in_stock }}</h2>
    </div>

    <div class="card">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <h3>Low Stock</h3>
        <h2>18</h2>
    </div>

</div>
</div>

</div>

</body>
</html>
