<!DOCTYPE html>
<html>
<head>
    <title>Add Supplier</title>

    <style>
        body{
            background:#f4f7fc;
            font-family:Arial,sans-serif;
        }

        .card{
            width:450px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#0d6efd;
        }

        input,textarea{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            background:#0d6efd;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#0b5ed7;
        }
    </style>
</head>

<body>

<div class="card">

<h1>➕ Add Supplier</h1>

<form method="POST">

<label>Supplier Name</label>
<input type="text" name="supplier_name" required>

<label>Company Name</label>
<input type="text" name="company_name" required>

<label>Phone</label>
<input type="text" name="phone" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Address</label>
<textarea name="address" rows="3" required></textarea>

<button type="submit">Save Supplier</button>

</form>

</div>

</body>
</html>
