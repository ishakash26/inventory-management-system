<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>

    <style>
        body{
            background:#f4f7fc;
            font-family:Arial, sans-serif;
        }

        .card{
            width:400px;
            margin:50px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
        }

        label{
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            padding:10px 20px;
            border:none;
            border-radius:8px;
            color:white;
            background:#0d6efd;
            cursor:pointer;
            margin-right:10px;
        }

        button:hover{
            background:#0b5ed7;
        }
    </style>
</head>

<body>

<div class="card">

<h1>Edit Profile</h1>

<form method="POST">

<label>Name</label>
<input type="text" name="name" placeholder="Enter Name">

<label>Email</label>
<input type="email" name="email" placeholder="Enter Email">

<button type="submit">Save</button>

<a href="/settings">
    <button type="button">Back</button>
</a>

</form>

</div>

</body>
</html>
