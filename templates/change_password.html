<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>

    <style>
        body{
            background:#f4f7fc;
            font-family:Arial,sans-serif;
        }

        .card{
            width:400px;
            margin:60px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#0d6efd;
        }

        label{
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            background:#0d6efd;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:8px;
            cursor:pointer;
            margin-right:10px;
        }

        button:hover{
            background:#0b5ed7;
        }

        .back{
            background:#6c757d;
        }

        .back:hover{
            background:#5a6268;
        }
    </style>
</head>

<body>

<div class="card">

<h1>🔒 Change Password</h1>

<form method="POST">

<label>Old Password</label>
<input type="password" name="old_password" required>

<label>New Password</label>
<input type="password" name="new_password" required>

<button type="submit">Update Password</button>

<a href="/settings">
    <button type="button" class="back">Back</button>
</a>

</form>

</div>

</body>
</html>
